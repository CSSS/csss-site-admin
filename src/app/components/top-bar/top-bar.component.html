<p-menubar [model]="menuItems">
  <ng-template #item let-item let-root="root">
    <a class="p-menubar-item-link" [routerLink]="item.routerLink">
      <i [class]="item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
  </ng-template>
  <ng-template #end>
    <p-menu #menu [popup]="true" [model]="options" />
    <p-button
      [label]="auth.user()?.computing_id ?? ''"
      (click)="menu.toggle($event)"
      severity="secondary"
    />
  </ng-template>
</p-menubar>
