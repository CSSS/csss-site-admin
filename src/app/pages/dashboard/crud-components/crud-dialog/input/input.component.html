<p-floatlabel variant="on">
  <input
    pInputText
    [id]="fieldId()"
    [disabled]="isDisabled"
    [invalid]="isInvalid()"
    [value]="value"
    (onChange)="onChange($event.target.value)"
    (blur)="onTouched()"
    type="text"
  />
  <label [for]="fieldId()">{{ label() }}</label>
</p-floatlabel>
@if (isRequiredMissing()) {
  <p-message severity="error" variant="simple">"{{ label() }}" is required</p-message>
}
