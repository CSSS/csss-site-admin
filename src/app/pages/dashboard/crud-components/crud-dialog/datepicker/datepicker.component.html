<p-floatlabel variant="on">
  <p-datepicker
    [(ngModel)]="value"
    [inputId]="fieldId()"
    [disabled]="isDisabled"
    [invalid]="isInvalid()"
    (onSelect)="onChange($event)"
    (onBlur)="onTouched()"
    iconDisplay="input"
    [showIcon]="true"
    appendTo="body"
    fluid
  />
  <label [attr.for]="fieldId()">{{ label() }}</label>
</p-floatlabel>
@if (isRequiredMissing()) {
  <p-message severity="error" variant="simple">"{{ label() }}" is required</p-message>
}
