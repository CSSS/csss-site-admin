<p-floatlabel variant="on">
  <input
    pInputText
    id="id()"
    [disabled]="isDisabled"
    [invalid]="isInvalid()"
    (input)="onChange($event.target.value)"
    (blur)="onTouched()"
    type="text"
  />
  <label for="id()">{{ label() }}</label>
</p-floatlabel>
@if (isRequiredMissing()) {
  <p-message severity="error" variant="simple">"{{ label() }}" is required</p-message>
}
