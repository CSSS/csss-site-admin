<form class="dialog-form" [formGroup]="form" (ngSubmit)="submit()">
  <cs-input
    id="elections-field__name"
    label="Election Name"
    formControlName="name"
    [required]="true"
    [invalid]="isInvalid('name')"
  />
  <cs-select
    id="elections-field__type"
    label="Election Type"
    formControlName="type"
    [options]="electionTypes"
    dataKey="label"
    optionLabel="label"
    optionValue="value"
    [required]="true"
    [invalid]="isInvalid('type')"
  />
</form>
